name: Ruby

on:
  push:
    branches:
      - master

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - '3.4.4'

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Download DuckDB library
        run: |
          curl -sOL https://github.com/duckdb/duckdb/releases/download/v1.4.4/libduckdb-linux-amd64.zip
          unzip -o libduckdb-linux-amd64.zip -d libduckdb
      - name: Install DuckDB library
        run: |
          sudo cp libduckdb/libduckdb.so /usr/local/lib/
          sudo ldconfig
      - name: Build with DuckDB
        run: bundle exec rake build -- --with-duckdb-include=${GITHUB_WORKSPACE}/libduckdb --with-duckdb-lib=${GITHUB_WORKSPACE}/libduckdb
      - name: Run the default task
        run: bundle exec rake
